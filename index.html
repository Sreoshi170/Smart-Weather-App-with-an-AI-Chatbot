<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App with Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #71b7e6, #9b59b6);
        }

        .weather-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .weather-card h1 {
            font-size: 1.8em;
            margin-bottom: 10px;
            color: #333;
        }

        .weather-card .weather-emoji {
            font-size: 3em;
            margin: 10px 0;
        }

        .weather-card .temperature {
            font-size: 2.5em;
            font-weight: bold;
            color: #2c3e50;
            margin: 10px 0;
        }

        .weather-card .description {
            font-size: 1.2em;
            color: #555;
            text-transform: capitalize;
            margin-bottom: 15px;
        }

        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .detail-item {
            background: rgba(0, 0, 0, 0.05);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9em;
        }

        .detail-item span {
            font-weight: bold;
            color: #2c3e50;
        }

        .error {
            color: #e74c3c;
            font-size: 1em;
            margin-top: 10px;
            display: none;
        }

        .loading {
            font-size: 1em;
            color: #555;
            margin-top: 10px;
            display: none;
        }

        .chat-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: flex-end;
            justify-content: center;
        }

        .chat-container {
            background: white;
            border-radius: 15px 15px 0 0;
            width: 100%;
            max-width: 500px;
            height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.2);
        }

        .chat-header {
            background: linear-gradient(135deg, #71b7e6, #9b59b6);
            color: white;
            padding: 15px;
            border-radius: 15px 15px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-body {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: #f9fafb;
        }

        .chat-message {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .chat-message.user {
            align-items: flex-end;
        }

        .chat-message.ai {
            align-items: flex-start;
        }

        .chat-message .message-content {
            max-width: 70%;
            padding: 10px 15px;
            border-radius: 10px;
            font-size: 0.9em;
        }

        .chat-message.user .message-content {
            background: #71b7e6;
            color: white;
        }

        .chat-message.ai .message-content {
            background: #e5e7eb;
            color: #333;
        }

        .chat-message.typing .message-content {
            background: #e5e7eb;
            color: #333;
            display: flex;
            align-items: center;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #333;
            border-radius: 50%;
            margin: 0 2px;
            animation: typing 0.8s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {

            0%,
            80%,
            100% {
                transform: translateY(0);
                opacity: 0.4;
            }

            40% {
                transform: translateY(-5px);
                opacity: 1;
            }
        }

        .chat-footer {
            padding: 15px;
            background: white;
            border-top: 1px solid #e5e7eb;
        }

        .chat-footer input {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 25px;
            outline: none;
        }

        .ai-assistant-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: linear-gradient(135deg, #4fba16, #11cb36);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            z-index: 999;
        }

        .ai-assistant-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
        }

        .ai-assistant-button span {
            font-size: 1.5em;
        }

        @media (min-width: 640px) {
            .chat-modal {
                align-items: center;
            }

            .chat-container {
                border-radius: 15px;
                height: 70vh;
                max-width: 400px;
            }
        }

        @media (max-width: 600px) {
            .weather-card h1 {
                font-size: 1.5em;
            }

            .weather-card .temperature {
                font-size: 2em;
            }

            .weather-card .weather-emoji {
                font-size: 2.5em;
            }

            .weather-details {
                grid-template-columns: 1fr;
            }

            .ai-assistant-button {
                width: 50px;
                height: 50px;
                bottom: 15px;
                right: 15px;
            }

            .ai-assistant-button span {
                font-size: 1.2em;
            }
        }
    </style>
</head>

<body>
    <div class="container max-w-md mx-auto p-4 sm:p-6">
        <div class="weather-card">
            <h1 id="location">Getting location...</h1>
            <div class="weather-emoji" id="weather-emoji">⏳</div>
            <div class="temperature" id="temperature">--°C</div>
            <div class="description" id="description">Loading...</div>
            <div class="weather-details">
                <div class="detail-item">
                    <span>Humidity:</span> <span id="humidity">--%</span>
                </div>
                <div class="detail-item">
                    <span>Wind Speed:</span> <span id="wind-speed">-- m/s</span>
                </div>
                <div class="detail-item">
                    <span>Pressure:</span> <span id="pressure">-- hPa</span>
                </div>
                <div class="detail-item">
                    <span>Feels Like:</span> <span id="feels-like">--°C</span>
                </div>
            </div>
            <div class="loading" id="loading">Fetching weather data...</div>
            <div class="error" id="error"></div>
        </div>
    </div>

    <div class="ai-assistant-button" id="chat-button" title="AI Weather Assistant">
        <span>💬</span>
    </div>

    <div class="chat-modal" id="chat-modal">
        <div class="chat-container">
            <div class="chat-header">
                <h2 class="text-lg font-semibold">Weather Assistant</h2>
                <button id="close-chat" class="text-white hover:text-gray-200">✕</button>
            </div>
            <div class="chat-body" id="chat-body">
                <div class="chat-message ai">
                    <div class="message-content">Hello! I'm your Weather Assistant. Ask me anything! 😊</div>
                </div>
            </div>
            <div class="chat-footer">
                <input type="text" id="chat-input" placeholder="Type your message..."
                    class="focus:ring-2 focus:ring-blue-500">
            </div>
        </div>
    </div>

    <script>
        const weatherApiKey = WEATHER_API_KEY;
        const geminiApiKey = GEMINI_API_KEY;
        const weatherEmoji = document.getElementById('weather-emoji');
        const temperature = document.getElementById('temperature');
        const description = document.getElementById('description');
        const humidity = document.getElementById('humidity');
        const windSpeed = document.getElementById('wind-speed');
        const pressure = document.getElementById('pressure');
        const feelsLike = document.getElementById('feels-like');
        const locationElement = document.getElementById('location');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const chatButton = document.getElementById('chat-button');
        const chatModal = document.getElementById('chat-modal');
        const closeChat = document.getElementById('close-chat');
        const chatInput = document.getElementById('chat-input');
        const chatBody = document.getElementById('chat-body');

        let currentTemperature = '--°C';

        // Weather emoji mapping
        const weatherEmojis = {
            'Clear': '☀️',
            'Clouds': '☁️',
            'Rain': '🌧️',
            'Drizzle': '🌦️',
            'Thunderstorm': '⛈️',
            'Snow': '❄️',
            'Mist': '🌫️',
            'Fog': '🌫️',
            'Haze': '🌫️'
        };

        // Get user's location
        function getLocation() {
            if (navigator.geolocation) {
                loading.style.display = 'block';
                navigator.geolocation.getCurrentPosition(fetchWeather, showError);
            } else {
                showError('Geolocation is not supported by this browser.');
            }
        }

        // Fetch weather data
        async function fetchWeather(position) {
            const { latitude, longitude } = position.coords;
            const url = `https://api.openweathermap.org/data/2.5/weather?lat=${latitude}&lon=${longitude}&appid=${weatherApiKey}&units=metric`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Failed to fetch weather data');
                const data = await response.json();

                // Update UI and store temperature
                currentTemperature = `${Math.round(data.main.temp)}°C`;
                locationElement.textContent = data.name;
                temperature.textContent = currentTemperature;
                description.textContent = data.weather[0].description;
                humidity.textContent = `${data.main.humidity}%`;
                windSpeed.textContent = `${data.wind.speed} m/s`;
                pressure.textContent = `${data.main.pressure} hPa`;
                feelsLike.textContent = `${Math.round(data.main.feels_like)}°C`;

                // Set weather emoji
                const weatherMain = data.weather[0].main;
                weatherEmoji.textContent = weatherEmojis[weatherMain] || '🌈';

                loading.style.display = 'none';
                error.style.display = 'none';
            } catch (err) {
                showError('Error fetching weather data. Please try again later.');
            }
        }

        // Show error message
        function showError(message) {
            loading.style.display = 'none';
            error.style.display = 'block';
            error.textContent = message;
        }

        // Chatbot functionality
        chatButton.addEventListener('click', () => {
            chatModal.style.display = 'flex';
        });

        closeChat.addEventListener('click', () => {
            chatModal.style.display = 'none';
        });

        chatInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && chatInput.value.trim()) {
                const userMessage = chatInput.value.trim();
                appendMessage('user', userMessage);
                chatInput.value = '';

                // Show typing indicator
                appendTypingIndicator();

                // Call Gemini API
                try {
                    const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-goog-api-key': geminiApiKey
                        },
                        body: JSON.stringify({
                            contents: [
                                {
                                    parts: [
                                        {
                                            text: `Based on the current temperature ${currentTemperature}, ${userMessage}`
                                        }
                                    ]
                                }
                            ]
                        })
                    });

                    if (!response.ok) throw new Error('Failed to fetch AI response');
                    const data = await response.json();
                    const aiMessage = data.candidates[0].content.parts[0].text || 'Sorry, I could not generate a response.';

                    // Remove typing indicator and append AI message
                    removeTypingIndicator();
                    appendMessage('ai', aiMessage);
                } catch (err) {
                    removeTypingIndicator();
                    appendMessage('ai', 'Error fetching AI response. Please try again later.');
                }
            }
        });

        function appendMessage(sender, text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `chat-message ${sender}`;
            messageDiv.innerHTML = `<div class="message-content">${text}</div>`;
            chatBody.appendChild(messageDiv);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        function appendTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'chat-message ai typing';
            typingDiv.innerHTML = `<div class="message-content typing-indicator"><span></span><span></span><span></span></div>`;
            chatBody.appendChild(typingDiv);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        function removeTypingIndicator() {
            const typingDiv = document.querySelector('.typing');
            if (typingDiv) typingDiv.remove();
        }

        // Initialize
        getLocation();
    </script>
</body>

</html>
